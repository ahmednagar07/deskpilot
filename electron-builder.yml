appId: com.deskpilot.app
productName: DeskPilot
copyright: Copyright © 2026 Nagar

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*
  - "!node_modules/**/*.{md,txt,map}"

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - dmg
    - zip
  icon: resources/icon.png
  category: public.app-category.utilities
  darkModeSupport: true

dmg:
  title: "${productName} ${version}"
  artifactName: "${productName}-${version}-mac.${ext}"

linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Utility
  desktop:
    entry:
      Name: DeskPilot
      Comment: Smart desktop file management
      Terminal: "false"

appImage:
  artifactName: "${productName}-${version}-linux.${ext}"

publish:
  provider: github
  owner: ahmednagar07
  repo: deskpilot

# Database is created at runtime in userData, not bundled
